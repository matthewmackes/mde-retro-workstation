# Minimal nested sway for MDE-Retro visual verification (headless backend).
# Launched by nested-sway.sh with WLR_BACKENDS=headless. Deliberately execs none
# of the user's autostart, so it's fully isolated from the live desktop.
output HEADLESS-1 resolution 1280x1024 position 0 0
output HEADLESS-1 bg #3a6ea5 solid_color

# Windows 2000 server-side decorations so window title bars render navy.
default_border normal 2
title_align left
client.focused          #0a246a #0a246a #ffffff #0a246a #0a246a
client.focused_inactive #808080 #808080 #d4d0c8 #808080 #808080
client.unfocused        #808080 #808080 #d4d0c8 #808080 #808080
font pango:Sans Bold 8
