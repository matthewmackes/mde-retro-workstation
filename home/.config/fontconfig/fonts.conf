<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "fonts.dtd">
<!-- Map "Tahoma" (the Windows 2000 UI font, not freely available) to the
     closest installed humanist sans. If real Tahoma is ever installed it
     takes precedence automatically. -->
<fontconfig>
  <alias binding="same">
    <family>Tahoma</family>
    <prefer>
      <family>Droid Sans</family>
      <family>Noto Sans</family>
      <family>Cantarell</family>
    </prefer>
    <default><family>sans-serif</family></default>
  </alias>
</fontconfig>
