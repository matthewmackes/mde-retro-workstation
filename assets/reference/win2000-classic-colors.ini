; ============================================================================
;  Windows 2000 "Classic" system color table  (GetSysColor / COLOR_* defaults)
;
;  This is the ground-truth palette MDE-Retro reimplements. The values match
;  the Windows 2000 default Classic scheme and ReactOS's reimplementation of
;  it; they are the source of the hex codes used across the Sway / Waybar /
;  wofi configs. Keep this file and the configs in sync.
;
;  Format:  COLOR_NAME = R G B   ; #RRGGBB   -> where it shows up in MDE-Retro
; ============================================================================

[Classic]
Background        = 58 110 165   ; #3a6ea5  desktop wallpaper color (output bg)
ActiveTitle       = 10 36 106    ; #0a246a  focused title bar / Highlight
GradientActiveTitle = 166 202 240 ; #a6caf0  title gradient end (Waybar only)
InactiveTitle     = 128 128 128  ; #808080  unfocused title bar
TitleText         = 255 255 255  ; #ffffff  focused title text
InactiveTitleText = 212 208 200  ; #d4d0c8  unfocused title text
Menu              = 212 208 200  ; #d4d0c8  menu background
MenuText          = 0 0 0        ; #000000
Window            = 255 255 255  ; #ffffff  client-area background
WindowText        = 0 0 0        ; #000000
WindowFrame       = 0 0 0        ; #000000
ButtonFace        = 212 208 200  ; #d4d0c8  3D face -> window frames / taskbar
ButtonShadow      = 128 128 128  ; #808080  3D shadow (dark bevel) / separators
ButtonDkShadow    = 64 64 64     ; #404040  3D darkest bevel
ButtonLight       = 223 223 223  ; #dfdfdf  3D light bevel
ButtonHilight     = 255 255 255  ; #ffffff  3D highlight (brightest bevel)
ButtonText        = 0 0 0        ; #000000
Highlight         = 10 36 106    ; #0a246a  selection / focused workspace
HighlightText     = 255 255 255  ; #ffffff
GrayText          = 128 128 128  ; #808080  disabled text
ActiveBorder      = 212 208 200  ; #d4d0c8
InactiveBorder    = 212 208 200  ; #d4d0c8
AppWorkspace      = 128 128 128  ; #808080  MDI background
Scrollbar         = 212 208 200  ; #d4d0c8
InfoText          = 0 0 0        ; #000000  tooltip text
InfoWindow        = 255 255 225  ; #ffffe1  tooltip background
Hilight           = 10 36 106    ; #0a246a  (alias of Highlight)
Urgent            = 128 0 0      ; #800000  MDE-Retro: urgent window (maroon)

; Fonts (Win2000 Classic): UI = "Tahoma 8pt"; title bars = "Tahoma Bold".
; MDE-Retro aliases Tahoma -> Droid Sans via fontconfig where Tahoma is absent.
