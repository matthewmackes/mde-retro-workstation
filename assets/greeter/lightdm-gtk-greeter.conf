# MDE-Retro Windows 10 greeter — generated (E10.9). Regenerate with
# tests/stage-greeter-assets.sh; installed by the RPM %post (E10.10).
[greeter]
theme-name = win10
icon-theme-name = Adwaita
font-name = IBM Plex Sans 11
xft-antialias = true
xft-hintstyle = slight
clock-format = %l:%M %p
indicators = ~host;~spacer;~clock;~spacer;~session;~power
position = 50%,center 55%,center
background = /usr/share/backgrounds/mde-retro/login.png
